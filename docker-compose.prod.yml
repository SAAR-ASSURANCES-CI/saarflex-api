services:
  api:
    build:
      context: .
      target: production
    container_name: saarflex-api-prod
    env_file:
      - .env.prod
    environment:
      - PORT=4000
      - NODE_ENV=production
    ports:
      - "127.0.0.1:4000:4000"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - saarflex-network

  db:
    image: mysql:8.0
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3007:3306"
    volumes:
      - saarflex_db_data_prod:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          memory: 256M
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_ROOT_PASSWORD}",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - saarflex-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: saarflex-phpmyadmin-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    environment:
      PMA_HOST: ${DB_HOST}
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
      PMA_ARBITRARY: 1
      MYSQL_ALLOW_EMPTY_PASSWORD: 0
    depends_on:
      saarflex-db:
        condition: service_healthy
    networks:
      - saarflex-network

  redis:
    image: redis:7-alpine
    container_name: saarflex-redis-prod
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 256mb 
      --maxmemory-policy allkeys-lru
      --save 900 1 
      --save 300 10 
      --save 60 10000
      --tcp-keepalive 60
      --timeout 300
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - saarflex-network

volumes:
  saarflex_db_data_prod:
    driver: local
  redis_data_prod:
    driver: local

networks:
  saarflex-network:
    driver: bridge
